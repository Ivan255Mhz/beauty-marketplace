services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beauty_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=beauty_marketplace;Username=postgres;Password=postgres
      - Jwt__Key=YourSuperSecretKey_ChangeThisInProduction_AtLeast32Chars!
      - Jwt__Issuer=BeautyMarketplace
      - Jwt__Audience=BeautyMarketplaceUsers
      - ASPNETCORE_ENVIRONMENT=Development
      - App__FrontendUrl=http://localhost
      # ── SMTP Yandex ─────────────────────────────────────────────────────────
      # Заполните User и Password для реальной отправки писем.
      # Пока пусто — ссылка подтверждения печатается в лог (DEV режим).
      - Smtp__Host=smtp.yandex.ru
      - Smtp__Port=465
      - Smtp__Ssl=true
      - Smtp__User=ivansamiko1996@yandex.ru
      - Smtp__Password=ueseozcodypzimpt
      - Smtp__From=ivansamiko1996@yandex.ru
      - Smtp__FromName=BeautyBook
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/wwwroot/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"       # http://localhost — основной адрес
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
